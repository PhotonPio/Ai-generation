<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI Video Generator</h1>

      <section class="auth-row">
        <div>
          <label for="apiUser">API User</label>
          <input id="apiUser" type="text" placeholder="admin" />
        </div>
        <div>
          <label for="apiPass">API Pass</label>
          <input id="apiPass" type="password" placeholder="changeme" />
        </div>
        <button id="saveAuthBtn" class="btn-secondary">Save Auth</button>
      </section>

      <nav class="steps" id="stepNav">
        <div class="step-item active" data-step="setup">1 Setup</div>
        <div class="step-item" data-step="script">2 Script</div>
        <div class="step-item" data-step="images">3 Images</div>
        <div class="step-item" data-step="audio">4 Audio</div>
        <div class="step-item" data-step="render">5 Render</div>
      </nav>

      <section class="phase-progress">
        <div class="phase-line"><span>Script</span><progress id="phaseScript" max="100" value="0"></progress></div>
        <div class="phase-line"><span>Images</span><progress id="phaseImages" max="100" value="0"></progress></div>
        <div class="phase-line"><span>Audio</span><progress id="phaseAudio" max="100" value="0"></progress></div>
        <div class="phase-line"><span>Render</span><progress id="phaseRender" max="100" value="0"></progress></div>
      </section>

      <section id="step-setup" class="phase active">
        <label for="prompt">What is your video about?</label>
        <textarea id="prompt" rows="4" placeholder="e.g. Create a 5-minute educational video about black holes"></textarea>

        <div class="row">
          <div>
            <label for="minutes">Length (minutes)</label>
            <select id="minutes">
              <option value="1">1</option>
              <option value="5" selected>5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="30">30</option>
            </select>
          </div>
          <div>
            <label for="sceneSeconds">Scene length (sec)</label>
            <select id="sceneSeconds">
              <option value="6">6</option>
              <option value="8" selected>8</option>
              <option value="10">10</option>
            </select>
          </div>
          <div>
            <label for="voice">Narrator voice</label>
            <input id="voice" value="narrator" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="model">Model</label>
            <input id="model" value="llama3:8b" />
          </div>
          <div>
            <label for="style">Style</label>
            <select id="style">
              <option value="educational" selected>educational</option>
              <option value="storytelling">storytelling</option>
              <option value="documentary">documentary</option>
              <option value="fun">fun</option>
            </select>
          </div>
          <div>
            <label for="language">Language</label>
            <select id="language">
              <option value="auto" selected>auto</option>
              <option value="en">English</option>
              <option value="de">German</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="transitionStyle">Transition style</label>
            <select id="transitionStyle">
              <option value="kenburns" selected>kenburns</option>
              <option value="fade">fade</option>
              <option value="none">none</option>
            </select>
          </div>
          <div>
            <label for="steps">Image steps</label>
            <input id="steps" type="number" min="5" max="100" value="20" />
          </div>
          <div>
            <label for="seed">Seed (optional)</label>
            <input id="seed" type="number" placeholder="auto" />
          </div>
        </div>

        <div class="checkbox-row">
          <label><input id="clearCache" type="checkbox" /> Clear cache</label>
          <label><input id="autoSceneDuration" type="checkbox" /> Auto scene duration</label>
          <label><input id="profile" type="checkbox" /> Profile run</label>
        </div>

        <button id="generateBtn" class="btn-primary">Generate Script</button>
      </section>

      <section id="step-script" class="phase hidden">
        <h2>Review Script</h2>
        <div id="scriptScenes"></div>
        <button id="approveScriptBtn" class="btn-primary">Approve &amp; Generate Images</button>
      </section>

      <section id="step-images" class="phase hidden">
        <h2>Review Images</h2>
        <div id="thumbnailGrid" class="thumb-grid"></div>
        <div id="imageGrid" class="review-grid"></div>
        <button id="approveImagesBtn" class="btn-primary">Approve &amp; Generate Audio</button>
      </section>

      <section id="step-audio" class="phase hidden">
        <h2>Review Audio</h2>
        <div id="audioList" class="review-list"></div>
        <button id="approveAudioBtn" class="btn-primary">Approve &amp; Render Video</button>
      </section>

      <section id="step-render" class="phase hidden">
        <h2>Rendering Video</h2>
        <div id="renderStatus" class="phase-status">Starting render…</div>
        <progress id="progressBar" max="100" value="0"></progress>
        <video id="previewVideo" controls class="hidden"></video>
        <a id="downloadLink" href="#" class="hidden btn-primary" download>Download MP4</a>
      </section>

      <section class="logs">
        <h2>Live Logs</h2>
        <pre id="logBox"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
