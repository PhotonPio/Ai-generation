<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>AI Video Generator</h1>
      <p class="subtitle">Generate a narrated video from a single prompt.</p>

      <form id="videoForm" class="panel">
        <label for="prompt">Video prompt</label>
        <textarea id="prompt" name="prompt" rows="6" placeholder="Describe your video..." required></textarea>

        <label for="minutes">Video length</label>
        <select id="minutes" name="minutes">
          <option value="1">1 minute</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
        </select>

        <button id="generateBtn" type="submit">Generate Video</button>
      </form>

      <section id="progressSection" class="panel hidden" aria-live="polite">
        <div class="status-row">
          <span id="statusLabel">Starting...</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="spinner" class="spinner" aria-label="Loading"></div>
      </section>

      <section id="downloadSection" class="panel hidden">
        <h2>Video ready</h2>
        <img id="thumbnailPreview" class="hidden" alt="Video thumbnail preview" />
        <a id="downloadBtn" class="download-btn" href="#" download>Download MP4</a>
      </section>

      <section id="errorSection" class="panel error hidden" aria-live="assertive">
        <strong>Something went wrong</strong>
        <p id="errorMessage"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
